# Sanda local development stack.
# Start with `pnpm infra:up`. Data is persisted in named volumes.

name: sanda

services:
  # Exposed host ports are configurable from the repo root `.env` so the stack
  # can coexist with other local projects.
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sanda-postgres
    environment:
      POSTGRES_USER: sanda
      POSTGRES_PASSWORD: sanda
      POSTGRES_DB: sanda
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sanda -d sanda']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sanda-redis
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: sanda-meili
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: sanda-dev-master-key
    ports:
      - '${MEILI_HOST_PORT:-7700}:7700'
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: sanda-minio
    environment:
      MINIO_ROOT_USER: sanda
      MINIO_ROOT_PASSWORD: sandasanda
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_API_HOST_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/ready']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: sanda-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
        mc alias set sanda http://minio:9000 sanda sandasanda &&
        (mc mb sanda/sanda-dev || true) &&
        mc anonymous set download sanda/sanda-dev
      "

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: sanda-mailhog
    ports:
      - '${SMTP_HOST_PORT:-1025}:1025'
      - '${MAILHOG_UI_HOST_PORT:-8025}:8025'

volumes:
  pgdata:
  redisdata:
  meilidata:
  miniodata:
